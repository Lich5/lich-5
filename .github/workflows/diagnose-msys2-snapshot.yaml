name: diagnose MSYS2 native stack

on:
  workflow_dispatch:
    inputs:
      snapshot-date:
        description: "MSYS2 base archive date to test, for example 20250830 or 20250622."
        required: false
        default: "20250830"
      msys-source:
        description: "Use a dated MSYS2 base archive or the current latest MSYS2 base archive."
        required: false
        default: "dated"
        type: choice
        options:
          - "dated"
          - "current"
      mode:
        description: "query-only stops after package DB inspection; install-and-smoke installs GTK stack and tests gtk3."
        required: false
        default: "query-only"
        type: choice
        options:
          - "query-only"
          - "install-and-smoke"
      gtk3-gem-version:
        description: "gtk3 gem version to use in install-and-smoke mode."
        required: false
        default: "4.3.3"
      ruby-installer-version:
        description: "RubyInstaller archive version to use in install-and-smoke mode, for example 3.4.5-1 or 4.0.3-1."
        required: false
        default: "3.4.5-1"

permissions:
  contents: read

jobs:
  diagnose_msys2_snapshot:
    name: Diagnose MSYS2 package universe
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Validate inputs
        shell: powershell
        run: |
          $snapshotDate = '${{ inputs.snapshot-date }}'
          $msysSource = '${{ inputs.msys-source }}'
          $mode = '${{ inputs.mode }}'
          $gtk3GemVersion = '${{ inputs.gtk3-gem-version }}'
          $rubyInstallerVersion = '${{ inputs.ruby-installer-version }}'

          if ($msysSource -notin @('dated', 'current')) {
            Write-Error "msys-source must be 'dated' or 'current'; received '$msysSource'."
            exit 1
          }

          if ($snapshotDate -notmatch '^\d{8}$') {
            Write-Error "snapshot-date must be YYYYMMDD, for example 20250830; received '$snapshotDate'."
            exit 1
          }

          if ($gtk3GemVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "gtk3-gem-version must look like N.N.N; received '$gtk3GemVersion'."
            exit 1
          }

          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "ruby-installer-version must look like N.N.N-N, for example 3.4.5-1; received '$rubyInstallerVersion'."
            exit 1
          }

          "MSYS2_SNAPSHOT_DATE=$snapshotDate" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYS2_SOURCE=$msysSource" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "DIAG_MODE=$mode" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GTK3_GEM_VERSION=$gtk3GemVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_INSTALLER_VERSION=$rubyInstallerVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download and extract MSYS2 base archive
        shell: powershell
        run: |
          $snapshotDate = $env:MSYS2_SNAPSHOT_DATE
          $msysSource = $env:MSYS2_SOURCE
          $msysParent = 'C:\Ruby4Lich5'
          $msys = Join-Path $msysParent 'msys64'
          $distribUrl = 'https://repo.msys2.org/distrib/x86_64/'
          if ($msysSource -eq 'current') {
            Write-Host "Resolving newest MSYS2 base archive from $distribUrl"
            $index = Invoke-WebRequest -Uri $distribUrl -UseBasicParsing
            $archiveName = @(
              [regex]::Matches($index.Content, 'msys2-base-x86_64-\d{8}\.tar\.zst') |
                ForEach-Object { $_.Value } |
                Sort-Object -Unique -Descending
            ) | Select-Object -First 1
            if (-not $archiveName) {
              Write-Error "MSYS2 current archive resolution failed: no dated msys2-base-x86_64-YYYYMMDD.tar.zst entries found at $distribUrl."
              exit 1
            }
          } else {
            $archiveName = "msys2-base-x86_64-$snapshotDate.tar.zst"
          }
          $archive = Join-Path $env:RUNNER_TEMP $archiveName
          $url = "$distribUrl$archiveName"

          if (Test-Path $msysParent) {
            Remove-Item $msysParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $msysParent -Force | Out-Null

          Write-Host "Resolved MSYS2 archive: $archiveName"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          if (!(Test-Path $archive)) {
            Write-Error "MSYS2 snapshot download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          $extractWork = Join-Path $env:RUNNER_TEMP "msys2-base-$msysSource-$snapshotDate"
          if (Test-Path $extractWork) {
            Remove-Item $extractWork -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractWork -Force | Out-Null

          Write-Host "Extracting $archive to $extractWork with 7-Zip"
          & $sevenZip x $archive "-o$extractWork" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 snapshot zstd extraction failed."
            exit $LASTEXITCODE
          }

          $tarFile = Get-ChildItem $extractWork -Filter '*.tar' -File | Select-Object -First 1
          if (-not $tarFile) {
            Write-Error "MSYS2 snapshot extraction failed: no .tar file found after zstd extraction."
            exit 1
          }

          Write-Host "Extracting $($tarFile.FullName) to $msysParent with 7-Zip"
          & $sevenZip x $tarFile.FullName "-o$msysParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 snapshot tar extraction failed."
            exit $LASTEXITCODE
          }

          if (!(Test-Path (Join-Path $msys 'usr\bin\pacman.exe'))) {
            Write-Error "MSYS2 base extraction failed: pacman.exe not found under $msys."
            exit 1
          }

          "MSYS2_ROOT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build sanitized PATH for MSYS2
        id: snapshotpath
        shell: powershell
        run: |
          $msys = $env:MSYS2_ROOT
          if (!(Test-Path $msys)) {
            Write-Error "Cannot build snapshot PATH because MSYS2_ROOT does not exist: $msys"
            exit 1
          }

          $orig = $env:Path -split ';'
          $filtered = $orig | Where-Object {
            $_ -and
            ($_ -notlike '*\Ruby\*\x64\msys64\*') -and
            ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)') -and
            ($_ -ne 'C:\mingw64\bin') -and
            ($_ -notmatch '^C:\\Strawberry(\\|$)')
          }
          $snapshotPath = @("$msys\ucrt64\bin", "$msys\usr\bin") + $filtered
          $joined = ($snapshotPath -join ';')

          "PATH_DIAG_MSYS=$joined" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "path=$joined" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RI_DEVKIT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM=UCRT64" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM_PREFIX=/ucrt64" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Initialize MSYS2 keyring
        shell: powershell
        env:
          PATH: ${{ steps.snapshotpath.outputs.path }}
          MSYSTEM: UCRT64
        run: |
          $msys = $env:MSYS2_ROOT
          $env:Path = "$msys\ucrt64\bin;$msys\usr\bin;$env:Path"
          $bash = Join-Path $msys 'usr\bin\bash.exe'
          $pacmanKeyScript = Join-Path $msys 'usr\bin\pacman-key'
          $pacmanKeyExe = Join-Path $msys 'usr\bin\pacman-key.exe'

          if (!(Test-Path $bash)) {
            Write-Error "Snapshot keyring initialization failed: bash.exe not found at $bash."
            exit 1
          }

          if (!(Test-Path $pacmanKeyScript) -and !(Test-Path $pacmanKeyExe)) {
            Write-Host "::group::MSYS2 pacman tool files"
            Get-ChildItem (Join-Path $msys 'usr\bin') -Filter 'pacman*' -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
            Write-Host "::endgroup::"
            Write-Error "Snapshot keyring initialization failed: pacman-key was not found as either $pacmanKeyScript or $pacmanKeyExe."
            exit 1
          }

          Write-Host "Initializing MSYS2 keyring for extracted base archive through bash."
          & $bash -lc 'pacman-key --init'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 keyring initialization failed: pacman-key --init exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

          & $bash -lc 'pacman-key --populate msys2'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 keyring initialization failed: pacman-key --populate msys2 exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

      - name: Refresh current MSYS2 package universe
        if: ${{ inputs.msys-source == 'current' }}
        shell: powershell
        env:
          PATH: ${{ steps.snapshotpath.outputs.path }}
          MSYSTEM: UCRT64
        run: |
          $msys = $env:MSYS2_ROOT
          $env:Path = "$msys\ucrt64\bin;$msys\usr\bin;$env:Path"
          $bash = Join-Path $msys 'usr\bin\bash.exe'
          if (!(Test-Path $bash)) {
            Write-Error "Current MSYS2 refresh failed: bash.exe not found at $bash."
            exit 1
          }

          Write-Host "Refreshing current MSYS2 package databases and base packages."
          & $bash -lc 'pacman -Syu --noconfirm'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Current MSYS2 refresh failed: pacman -Syu exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

      - name: Query MSYS2 package universe
        shell: powershell
        env:
          PATH: ${{ steps.snapshotpath.outputs.path }}
          MSYSTEM: UCRT64
        run: |
          $msys = $env:MSYS2_ROOT
          $pacman = Join-Path $msys 'usr\bin\pacman.exe'
          $env:Path = "$msys\ucrt64\bin;$msys\usr\bin;$env:Path"

          Write-Host "::group::MSYS2 identity"
          Write-Host "msys-source=$env:MSYS2_SOURCE"
          Write-Host "snapshot-date=$env:MSYS2_SNAPSHOT_DATE"
          Write-Host "mode=$env:DIAG_MODE"
          Write-Host "ruby-installer-version=$env:RUBY_INSTALLER_VERSION"
          Write-Host "gtk3-gem-version=$env:GTK3_GEM_VERSION"
          Write-Host "msys=$msys"
          Write-Host "RI_DEVKIT=$env:RI_DEVKIT"
          Write-Host "MSYSTEM=$env:MSYSTEM"
          Write-Host "MSYSTEM_PREFIX=$env:MSYSTEM_PREFIX"
          Write-Host "PATH_DIAG_MSYS=$env:PATH_DIAG_MSYS"
          & $pacman --version
          Write-Host "::endgroup::"

          Write-Host "::group::Configured pacman repositories"
          Get-Content (Join-Path $msys 'etc\pacman.conf')
          Write-Host "::endgroup::"

          Write-Host "::group::Snapshot package DB candidates"
          $packages = @(
            'mingw-w64-ucrt-x86_64-glib2',
            'mingw-w64-ucrt-x86_64-gobject-introspection',
            'mingw-w64-ucrt-x86_64-gobject-introspection-runtime',
            'mingw-w64-ucrt-x86_64-gtk3',
            'mingw-w64-ucrt-x86_64-pkgconf',
            'mingw-w64-ucrt-x86_64-cairo',
            'mingw-w64-ucrt-x86_64-gdk-pixbuf2',
            'mingw-w64-ucrt-x86_64-pango',
            'mingw-w64-ucrt-x86_64-harfbuzz',
            'mingw-w64-ucrt-x86_64-libffi',
            'mingw-w64-ucrt-x86_64-libxml2',
            'mingw-w64-ucrt-x86_64-pcre2',
            'mingw-w64-ucrt-x86_64-zlib',
            'mingw-w64-ucrt-x86_64-gettext',
            'mingw-w64-ucrt-x86_64-gcc',
            'mingw-w64-ucrt-x86_64-gcc-libs',
            'mingw-w64-ucrt-x86_64-make',
            'mingw-w64-ucrt-x86_64-sqlite3'
          )

          $pacmanStdOut = Join-Path $env:RUNNER_TEMP 'pacman-sl-ucrt64.stdout.log'
          $pacmanStdErr = Join-Path $env:RUNNER_TEMP 'pacman-sl-ucrt64.stderr.log'
          $pacmanCmd = "`"$pacman`" -Sl ucrt64 > `"$pacmanStdOut`" 2> `"$pacmanStdErr`""
          cmd.exe /d /c $pacmanCmd
          $pacmanExit = $LASTEXITCODE
          $allEntries = @()
          if (Test-Path $pacmanStdOut) {
            $allEntries = @(Get-Content $pacmanStdOut -ErrorAction SilentlyContinue)
          }
          if (Test-Path $pacmanStdErr) {
            $stderr = Get-Content $pacmanStdErr -ErrorAction SilentlyContinue
            if ($stderr) {
              Write-Host "::group::pacman -Sl warnings"
              $stderr | ForEach-Object { Write-Host $_ }
              Write-Host "::endgroup::"
            }
          }
          if ($pacmanExit -ne 0 -and -not $allEntries) {
            Write-Error "MSYS2 package DB query failed: pacman -Sl ucrt64 exited with $pacmanExit and produced no package entries."
            exit $pacmanExit
          }

          foreach ($pkg in $packages) {
            $escaped = [regex]::Escape($pkg)
            $entry = @($allEntries | Where-Object { $_ -match "^ucrt64\s+$escaped\s+" })
            if ($entry.Count -eq 0) {
              Write-Host "MISSING $pkg"
              continue
            }
            $entry | ForEach-Object { Write-Host $_ }
          }
          Write-Host "::endgroup::"

          Write-Host "::group::Local package DB files"
          Get-ChildItem (Join-Path $msys 'var\lib\pacman\sync') -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
          Write-Host "::endgroup::"

      - name: Stop after query-only diagnostics
        if: ${{ inputs.mode == 'query-only' }}
        shell: powershell
        run: |
          Write-Host "query-only mode complete. Review the package universe above before choosing install-and-smoke."

      - name: Install GTK3 native stack from MSYS2
        if: ${{ inputs.mode == 'install-and-smoke' }}
        shell: powershell
        env:
          PATH: ${{ steps.snapshotpath.outputs.path }}
          MSYSTEM: UCRT64
          RI_DEVKIT: C:\Ruby4Lich5\msys64
          MSYSTEM_PREFIX: /ucrt64
        run: |
          $msys = $env:MSYS2_ROOT
          $pacman = Join-Path $msys 'usr\bin\pacman.exe'
          $env:Path = "$msys\ucrt64\bin;$msys\usr\bin;$env:Path"

          if ($env:MSYS2_SOURCE -eq 'current') {
            Write-Host "Installing from current MSYS2 package DB after pacman -Syu refresh."
          } else {
            Write-Host "Installing from bundled snapshot package DB. Intentionally not running pacman -Sy or pacman -Syu."
          }
          & $pacman -S --needed --noconfirm `
            mingw-w64-ucrt-x86_64-gcc `
            mingw-w64-ucrt-x86_64-gcc-libs `
            mingw-w64-ucrt-x86_64-make `
            mingw-w64-ucrt-x86_64-pkgconf `
            mingw-w64-ucrt-x86_64-gobject-introspection `
            mingw-w64-ucrt-x86_64-gobject-introspection-runtime `
            mingw-w64-ucrt-x86_64-sqlite3 `
            mingw-w64-ucrt-x86_64-gtk3 `
            make
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 install failed: pacman could not install the GTK3 native stack from the selected package DB."
            exit $LASTEXITCODE
          }

          Write-Host "::group::Installed package versions"
          & $pacman -Q
          Write-Host "::endgroup::"

          $gcc = Join-Path $msys 'ucrt64\bin\gcc.exe'
          $pkgc = Join-Path $msys 'ucrt64\bin\pkg-config.exe'
          "CC=$gcc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$pkgc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$msys\ucrt64\lib\pkgconfig;$msys\lib\pkgconfig" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download and extract RubyInstaller
        if: ${{ inputs.mode == 'install-and-smoke' }}
        shell: powershell
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $rubyParent = 'C:\Ruby4Lich5\ruby'
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$rubyInstallerVersion/rubyinstaller-$rubyInstallerVersion-x64.7z"

          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "RubyInstaller download failed: invalid ruby-installer-version '$rubyInstallerVersion'. Expected N.N.N-N, for example 3.4.5-1."
            exit 1
          }

          if (Test-Path $rubyParent) {
            Remove-Item $rubyParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null

          Write-Host "Downloading RubyInstaller $rubyInstallerVersion from $url"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          if (!(Test-Path $archive)) {
            Write-Error "RubyInstaller download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }

          Write-Host "Extracting RubyInstaller to $rubyParent with 7-Zip"
          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }

          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          Write-Host "RubyInstaller root: $rubyRoot"
          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          "RUBY_ROOT=$rubyRoot" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install and smoke gtk3 gem against MSYS2
        if: ${{ inputs.mode == 'install-and-smoke' }}
        shell: powershell
        env:
          PATH: ${{ steps.snapshotpath.outputs.path }}
          RI_DEVKIT: C:\Ruby4Lich5\msys64
          MSYSTEM: UCRT64
          MSYSTEM_PREFIX: /ucrt64
          CC: C:\Ruby4Lich5\msys64\ucrt64\bin\gcc.exe
          PKG_CONFIG: C:\Ruby4Lich5\msys64\ucrt64\bin\pkg-config.exe
          PKG_CONFIG_PATH: C:\Ruby4Lich5\msys64\ucrt64\lib\pkgconfig;C:\Ruby4Lich5\msys64\lib\pkgconfig
        run: |
          $msys = $env:MSYS2_ROOT
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          if (!(Test-Path $rubyExe)) {
            Write-Error "MSYS2 smoke failed: RUBY_EXE does not exist: $rubyExe"
            exit 1
          }
          $pathEntries = $env:Path -split ';' | Where-Object {
            $_ -and ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)')
          }
          $env:Path = (@("$rubyRoot\bin", "$msys\ucrt64\bin", "$msys\usr\bin") + $pathEntries) -join ';'

          Write-Host "::group::MSYS2 build surface"
          Write-Host "MSYS2_SOURCE=$env:MSYS2_SOURCE"
          Write-Host "RI_DEVKIT=$env:RI_DEVKIT"
          Write-Host "MSYSTEM=$env:MSYSTEM"
          Write-Host "MSYSTEM_PREFIX=$env:MSYSTEM_PREFIX"
          Write-Host "CC=$env:CC"
          Write-Host "PKG_CONFIG=$env:PKG_CONFIG"
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          where.exe ruby
          where.exe gcc
          where.exe pkg-config
          & $env:PKG_CONFIG --version
          & $env:PKG_CONFIG --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 gobject-2.0 gio-2.0 cairo pango
          Write-Host "::endgroup::"

          & $rubyExe -S gem install sqlite3 --platform ruby -- `
            --enable-system-libraries `
            --with-sqlite3-include="$msys/ucrt64/include" `
            --with-sqlite3-lib="$msys/ucrt64/lib"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 smoke failed: sqlite3 native gem could not compile."
            exit $LASTEXITCODE
          }

          & $rubyExe -S gem install gtk3 --version "$env:GTK3_GEM_VERSION" --no-document
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 smoke failed: gtk3 $env:GTK3_GEM_VERSION could not install."
            exit $LASTEXITCODE
          }

          Write-Host "::group::Ruby helper gem versions"
          & $rubyExe -S gem list pkg-config native-package-installer glib2 gio2 gobject-introspection gtk3
          Write-Host "::endgroup::"

          $glibGem = & $rubyExe -e "require 'rubygems'; puts Gem::Specification.find_by_name('glib2').full_gem_path"
          $giGem = & $rubyExe -e "require 'rubygems'; puts Gem::Specification.find_by_name('gobject-introspection').full_gem_path"
          $glibSo = Join-Path $glibGem 'lib\glib2.so'
          $giSo = Join-Path $giGem 'lib\gobject_introspection.so'
          $rubyDll = Get-ChildItem (Join-Path $rubyRoot 'bin') -Filter '*ruby*.dll' -ErrorAction SilentlyContinue | Select-Object -First 1

          Write-Host "::group::Ruby native extension files"
          foreach ($path in @($glibSo, $giSo)) {
            if (Test-Path $path) {
              $item = Get-Item $path
              Write-Host "FOUND $($item.FullName) length=$($item.Length) modified=$($item.LastWriteTime)"
            } else {
              Write-Host "MISSING $path"
            }
          }
          Write-Host "::endgroup::"

          Write-Host "::group::DLL resolution candidates"
          if ($rubyDll) {
            Write-Host "Ruby DLL=$($rubyDll.FullName) length=$($rubyDll.Length) modified=$($rubyDll.LastWriteTime)"
          } else {
            Write-Host "Ruby DLL=MISSING under $(Join-Path $rubyRoot 'bin')"
          }

          $dllChecks = @(
            'libglib-2.0-0.dll',
            'libgobject-2.0-0.dll',
            'libgio-2.0-0.dll',
            'libgirepository-1.0-1.dll',
            'libffi-8.dll',
            'libintl-8.dll',
            'libiconv-2.dll',
            'zlib1.dll'
          )
          if ($rubyDll) {
            $dllChecks = @($rubyDll.Name) + $dllChecks
          }

          foreach ($dll in $dllChecks) {
            Write-Host "where $dll"
            $whereOut = Join-Path $env:RUNNER_TEMP "where-$dll.stdout.log"
            $whereErr = Join-Path $env:RUNNER_TEMP "where-$dll.stderr.log"
            cmd.exe /d /c "where `"$dll`" > `"$whereOut`" 2> `"$whereErr`""
            if ($LASTEXITCODE -eq 0 -and (Test-Path $whereOut)) {
              Get-Content $whereOut -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "  no PATH match"
            }
          }
          Write-Host "::endgroup::"

          $objdumpCandidates = @(
            (Join-Path $msys 'ucrt64\bin\objdump.exe'),
            (Join-Path $msys 'ucrt64\bin\x86_64-w64-mingw32-objdump.exe'),
            (Join-Path $msys 'usr\bin\objdump.exe')
          )
          $objdump = $objdumpCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($objdump) {
            Write-Host "::group::Native imported DLL names"
            Write-Host "objdump=$objdump"
            $binaries = @(
              $glibSo,
              $giSo,
              (Join-Path $msys 'ucrt64\bin\libglib-2.0-0.dll'),
              (Join-Path $msys 'ucrt64\bin\libgobject-2.0-0.dll'),
              (Join-Path $msys 'ucrt64\bin\libgirepository-1.0-1.dll')
            )
            if ($rubyDll) {
              $binaries += $rubyDll.FullName
            }

            foreach ($binary in $binaries) {
              if (!(Test-Path $binary)) {
                Write-Host "MISSING $binary"
                continue
              }

              Write-Host "--- $binary"
              & $objdump -p $binary | Select-String -Pattern 'DLL Name'
            }
            Write-Host "::endgroup::"

            Write-Host "::group::Ruby extension imported Ruby symbols"
            foreach ($binary in @($glibSo, $giSo)) {
              if (!(Test-Path $binary)) {
                Write-Host "MISSING $binary"
                continue
              }

              Write-Host "--- $binary"
              & $objdump -p $binary | Select-String -Pattern 'DLL Name|Hint/Ord|rb_|ruby_|Init_'
            }
            Write-Host "::endgroup::"
          } else {
            Write-Host "::warning::objdump.exe was not found in the snapshot; native import table tracing was skipped."
          }

          $ntldd = Get-Command ntldd.exe -ErrorAction SilentlyContinue
          if ($ntldd) {
            Write-Host "::group::ntldd native dependency resolution"
            foreach ($binary in @($glibSo, $giSo)) {
              if (Test-Path $binary) {
                Write-Host "--- $binary"
                & $ntldd.Source -R $binary
              }
            }
            Write-Host "::endgroup::"
          } else {
            Write-Host "::notice::ntldd.exe was not available in the snapshot PATH."
          }

          & $rubyExe -e "require 'sqlite3'; require 'gtk3'; Gtk.init; puts 'MSYS2 GTK smoke OK'"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 smoke failed: Ruby could not require sqlite3/gtk3 and initialize GTK."
            exit $LASTEXITCODE
          }
